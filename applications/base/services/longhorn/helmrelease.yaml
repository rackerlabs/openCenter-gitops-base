---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: longhorn
      version: "v1.10.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn-repo
        namespace: longhorn-system
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 0
      remediateLastFailure: false
  targetNamespace: longhorn-system
  valuesFrom:
    - kind: Secret
      name: longhorn-values-base
      valuesKey: values.yaml
    - kind: Secret
      name: longhorn-values-override
      valuesKey: override.yaml
      optional: true
