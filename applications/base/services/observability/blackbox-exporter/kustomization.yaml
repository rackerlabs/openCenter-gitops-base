---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - "helmrelease.yaml"
secretGenerator:
  - name: blackbox-exporter-values-base
    namespace: observability
    type: Opaque
    files:
      - hardened.yaml=helm-values/hardened-values.yaml
    options:
      disableNameSuffixHash: true
