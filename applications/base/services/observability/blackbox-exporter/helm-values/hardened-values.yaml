---
# Hardened configuration for Prometheus Blackbox Exporter
# Following Zero Trust security principles for regulated environments

# Update strategy
strategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1
  type: RollingUpdate

# Image configuration
image:
  registry: quay.io
  repository: prometheus/blackbox-exporter
  # Overrides the image tag whose default is {{ printf "v%s" .Chart.AppVersion }}
  tag: ""
  pullPolicy: IfNotPresent
  # tag: v0.25.0  # Uncomment to pin specific version

# Service account
serviceAccount:
  create: true
  automountServiceAccountToken: true

# To-DO test the hardened values
# Pod security context
# podSecurityContext:
#   runAsNonRoot: true
#   runAsUser: 1000
#   fsGroup: 1000
#   seccompProfile:
#     type: RuntimeDefault

# # Container security context
# securityContext:
#   allowPrivilegeEscalation: false
#   readOnlyRootFilesystem: true
#   runAsNonRoot: true
#   runAsUser: 1000
#   capabilities:
#     drop:
#       - ALL

# Resources
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Node selector - ensure pods run on Linux nodes
nodeSelector:
  kubernetes.io/os: linux

# Tolerations
tolerations: []

# Affinity for pod distribution
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - prometheus-blackbox-exporter
          topologyKey: kubernetes.io/hostname

# Service configuration
service:
  type: ClusterIP
  port: 9115
  annotations: {}

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  defaults:
    labels: {}
    interval: 60s
    scrapeTimeout: 30s
  targets: []
  # Example targets:
  # - name: example
  #   url: https://example.com
  #   module: http_2xx

# Prometheus configuration
prometheusRule:
  enabled: true
  additionalLabels:
    prometheus: kube-prometheus-stack
  rules:
    - alert: BlackboxProbeDown
      expr: probe_success == 0
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox probe failed (instance {{ $labels.instance }})"
        description: "Probe {{ $labels.job }} has been down for more than 10 minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    # - alert: BlackboxProbeSlowHttp
    #   expr: avg_over_time(probe_http_duration_seconds[1m]) > 5
    #   for: 5m
    #   labels:
    #     severity: warning
    #   annotations:
    #     summary: "Blackbox probe slow HTTP (instance {{ $labels.instance }})"
    #     description: "HTTP request took more than 5s\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: BlackboxSslCertificateExpiry
      expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
      for: 0m
      labels:
        severity: warning
      annotations:
        summary: "Blackbox SSL certificate expiry (instance {{ $labels.instance }})"
        description: "SSL certificate expires in less than 30 days\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
    - alert: BlackboxSslCertificateExpiryCrit
      expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
      for: 0m
      labels:
        severity: critical
      annotations:
        summary: "Blackbox SSL certificate expiry (instance {{ $labels.instance }})"
        description: "SSL certificate expires in less than 7 days\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

# Blackbox exporter configuration
config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        method: GET
        preferred_ip_protocol: "ip4"
        follow_redirects: true
        fail_if_ssl: false
        fail_if_not_ssl: false
    http_post_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        method: POST
        preferred_ip_protocol: "ip4"
    tcp_connect:
      prober: tcp
      timeout: 5s
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"
    dns_tcp:
      prober: dns
      timeout: 5s
      dns:
        transport_protocol: "tcp"
        preferred_ip_protocol: "ip4"
        query_name: "kubernetes.default.svc.cluster.local"
    dns_udp:
      prober: dns
      timeout: 5s
      dns:
        transport_protocol: "udp"
        preferred_ip_protocol: "ip4"
        query_name: "kubernetes.default.svc.cluster.local"

# Extra configuration files
extraConfigmapMounts: []

# Extra secrets
extraSecretMounts: []

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Priority class
priorityClassName: ""

# Host aliases
hostAliases: []

# Enable service links
enableServiceLinks: false

# Extra environment variables
extraEnv: []

# Extra volumes
extraVolumes: []

# Extra volume mounts
extraVolumeMounts: []
replicas: 1
configReloader:
  enabled: true
  containerPort: 8080
  config:
    logFormat: logfmt
    logLevel: info
    watchInterval: 1m
  image:
    registry: quay.io
    repository: prometheus-operator/prometheus-config-reloader
    tag: "v0.88.1"
    pullPolicy: IfNotPresent
    digest: ""
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  resources:
    limits:
      memory: 50Mi
    requests:
      cpu: 10m
      memory: 20Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: reloader-web
      scheme: HTTP
  readinessProbe:
    httpGet:
      path: /healthz
      port: reloader-web
      scheme: HTTP
  service:
    port: 8080
  serviceMonitor:
    selfMonitor:
      additionalMetricsRelabels: {}
      additionalRelabeling: []
      path: /metrics
      scheme: http
      tlsConfig: {}
      interval: 30s
      scrapeTimeout: 30s

