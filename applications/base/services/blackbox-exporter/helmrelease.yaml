---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter
  namespace: blackbox-exporter
spec:
  releaseName: blackbox-exporter
  interval: 5m
  timeout: 10m
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    remediation:
      retries: 0
      remediateLastFailure: false
  targetNamespace: blackbox-exporter
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: 9.1.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: blackbox-exporter
  valuesFrom:
    - kind: Secret
      name: blackbox-exporter-values-base
      valuesKey: hardened.yaml
    - kind: Secret
      name: blackbox-exporter-values-override
      valuesKey: override.yaml
      optional: true
